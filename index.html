<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캐스팅엔 CRM 프로토타입</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #1A2332;
  --teal: #0891B2;
  --amber: #F59E0B;
  --bg: #F0F9FF;
  --slate: #1E293B;
  --gray: #64748B;
  --sidebar-w: 240px;
  --topbar-h: 56px;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--slate); display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--navy); color: #CBD5E1;
  display: flex; flex-direction: column;
  overflow-y: auto; scrollbar-width: thin; scrollbar-color: #334155 transparent;
}
.sidebar::-webkit-scrollbar { width: 5px; }
.sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

.sidebar-logo {
  padding: 20px 16px 16px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid #2D3B4E; flex-shrink: 0;
}
.sidebar-logo .logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--teal), #06B6D4);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
}
.sidebar-logo .logo-icon svg { width: 18px; height: 18px; }
.sidebar-logo span { font-size: 15px; font-weight: 700; color: #F1F5F9; letter-spacing: -0.3px; }

.sidebar-nav { padding: 8px 0; flex: 1; }
.nav-section { margin-bottom: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; font-size: 13px; cursor: pointer;
  transition: all 0.15s; color: #94A3B8;
  position: relative; user-select: none;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #E2E8F0; }
.nav-item.active { background: rgba(8,145,178,0.15); color: #22D3EE; }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 24px; background: var(--teal); border-radius: 0 3px 3px 0;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }
.nav-item .label { flex: 1; }
.nav-item .badge {
  font-size: 10px; background: rgba(8,145,178,0.25); color: #22D3EE;
  padding: 1px 6px; border-radius: 10px; font-weight: 600;
}
.nav-item .chevron { width: 16px; height: 16px; transition: transform 0.2s; opacity: 0.5; }
.nav-item .chevron.open { transform: rotate(90deg); }

.sub-menu { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
.sub-menu.open { max-height: 600px; }
.sub-item {
  display: block; padding: 7px 16px 7px 44px; font-size: 12.5px;
  color: #64748B; cursor: pointer; transition: all 0.15s; text-decoration: none;
}
.sub-item:hover { color: #CBD5E1; background: rgba(255,255,255,0.04); }
.sub-item.active { color: #22D3EE; }

.nav-divider { height: 1px; background: #2D3B4E; margin: 8px 16px; }

.sidebar-bottom {
  padding: 12px 16px; border-top: 1px solid #2D3B4E; flex-shrink: 0;
}
.sidebar-bottom .workspace {
  display: flex; align-items: center; gap: 8px;
  padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.04); cursor: pointer;
}
.sidebar-bottom .ws-avatar {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #6366F1, #8B5CF6);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.sidebar-bottom .ws-info { flex: 1; }
.sidebar-bottom .ws-name { font-size: 12px; color: #E2E8F0; font-weight: 600; }
.sidebar-bottom .ws-plan { font-size: 10px; color: #64748B; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: var(--topbar-h); background: #fff; border-bottom: 1px solid #E2E8F0;
  display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0;
}
.topbar-title { font-size: 15px; font-weight: 700; color: var(--slate); }
.topbar-search { flex: 1; max-width: 480px; position: relative; }
.topbar-search input {
  width: 100%; height: 36px; border: 1px solid #E2E8F0; border-radius: 8px;
  padding: 0 12px 0 36px; font-size: 13px; background: #F8FAFC;
  color: var(--slate); outline: none; transition: border-color 0.2s;
}
.topbar-search input::placeholder { color: #94A3B8; }
.topbar-search input:focus { border-color: var(--teal); background: #fff; }
.topbar-search svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: #94A3B8;
}
.topbar-search .shortcut {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-size: 11px; color: #94A3B8; background: #F1F5F9;
  padding: 2px 6px; border-radius: 4px; border: 1px solid #E2E8F0;
}
.topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.topbar-btn {
  width: 36px; height: 36px; border: none; background: transparent;
  border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--gray); transition: all 0.15s; position: relative;
}
.topbar-btn:hover { background: #F1F5F9; color: var(--slate); }
.topbar-btn .notif-dot {
  position: absolute; top: 6px; right: 6px;
  width: 8px; height: 8px; background: #EF4444; border-radius: 50%; border: 2px solid #fff;
}
.topbar-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), #06B6D4);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; cursor: pointer;
}

.content-frame { flex: 1; border: none; width: 100%; height: 100%; background: var(--bg); }

/* Process Flow */
.process-flow {
  display: flex; align-items: center; gap: 0;
  padding: 10px 24px; background: #fff; border-bottom: 1px solid #E2E8F0;
}
.process-step {
  display: flex; align-items: center; gap: 6px; padding: 6px 14px;
  border-radius: 20px; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; color: #94A3B8; background: #F8FAFC;
  white-space: nowrap;
}
.process-step:hover { background: #E0F2FE; color: var(--teal); }
.process-step.active { background: var(--teal); color: #fff; }
.process-step svg { width: 14px; height: 14px; }
.process-arrow { width: 24px; text-align: center; color: #CBD5E1; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.process-arrow svg { width: 16px; height: 16px; }
.process-bidir {
  display: flex; align-items: center; gap: 6px; margin-left: 16px;
  padding: 4px 12px; border-radius: 12px; background: #FEF3C7;
  font-size: 11px; color: #92400E; font-weight: 500;
}
.process-bidir svg { width: 14px; height: 14px; }
</style>
</head>

<script>
function go(url, title, el) {
  document.getElementById('contentFrame').src = url;
  document.getElementById('pageTitle').textContent = title || '';
  document.querySelectorAll('.sub-item').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(e => { if(!e.dataset.hasSub) e.classList.remove('active'); });
  if (el) {
    el.classList.add('active');
    const sec = el.closest('.nav-section');
    if (sec) { const p = sec.querySelector('.nav-item'); if(p) p.classList.add('active'); }
  }
}
function toggleSub(item) {
  const sub = item.nextElementSibling;
  const chev = item.querySelector('.chevron');
  if (!sub || !sub.classList.contains('sub-menu')) return;
  const wasOpen = sub.classList.contains('open');
  document.querySelectorAll('.sub-menu.open').forEach(m => {
    m.classList.remove('open');
    const c = m.previousElementSibling?.querySelector('.chevron');
    if(c) c.classList.remove('open');
  });
  if (!wasOpen) { sub.classList.add('open'); if(chev) chev.classList.add('open'); }
}
function setStep(n) {
  document.querySelectorAll('.process-step').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.step) === n);
  });
}
document.addEventListener('DOMContentLoaded', () => {
  const first = document.querySelector('.nav-section .nav-item[data-has-sub]');
  if (first) {
    const sub = first.nextElementSibling;
    const chev = first.querySelector('.chevron');
    if(sub) sub.classList.add('open');
    if(chev) chev.classList.add('open');
    first.classList.add('active');
    const fsub = sub?.querySelector('.sub-item');
    if(fsub) fsub.classList.add('active');
  }
});
</script>
