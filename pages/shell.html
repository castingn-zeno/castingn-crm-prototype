<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캐스팅엔 CRM - Shell</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #1A2332;
    --teal: #0891B2;
    --amber: #F59E0B;
    --bg: #F0F9FF;
    --slate: #1E293B;
    --gray: #64748B;
    --sidebar-w: 240px;
    --topbar-h: 56px;
  }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--slate); display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--navy);
    color: #CBD5E1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #334155 transparent;
  }
  .sidebar::-webkit-scrollbar { width: 5px; }
  .sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

  .sidebar-logo {
    padding: 20px 16px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #2D3B4E;
    flex-shrink: 0;
  }
  .sidebar-logo .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--teal), #06B6D4);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .sidebar-logo .logo-icon svg { width: 18px; height: 18px; }
  .sidebar-logo span { font-size: 15px; font-weight: 700; color: #F1F5F9; letter-spacing: -0.3px; }

  .sidebar-nav { padding: 8px 0; flex: 1; }

  .nav-section { margin-bottom: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: #94A3B8;
    position: relative;
    user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: #E2E8F0; }
  .nav-item.active { background: rgba(8,145,178,0.15); color: #22D3EE; }
  .nav-item.active::before {
    content: '';
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 24px;
    background: var(--teal);
    border-radius: 0 3px 3px 0;
  }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
  .nav-item.active svg { opacity: 1; }
  .nav-item .label { flex: 1; }
  .nav-item .chevron {
    width: 16px; height: 16px;
    transition: transform 0.2s;
    opacity: 0.5;
  }
  .nav-item .chevron.open { transform: rotate(90deg); }

  .sub-menu {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }
  .sub-menu.open { max-height: 600px; }
  .sub-item {
    display: block;
    padding: 7px 16px 7px 44px;
    font-size: 12.5px;
    color: #64748B;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }
  .sub-item:hover { color: #CBD5E1; background: rgba(255,255,255,0.04); }
  .sub-item.active { color: #22D3EE; }

  .sidebar-bottom {
    padding: 12px 16px;
    border-top: 1px solid #2D3B4E;
    flex-shrink: 0;
  }
  .sidebar-bottom .workspace {
    display: flex; align-items: center; gap: 8px;
    padding: 8px; border-radius: 8px;
    background: rgba(255,255,255,0.04);
    cursor: pointer;
  }
  .sidebar-bottom .ws-avatar {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
  }
  .sidebar-bottom .ws-info { flex: 1; }
  .sidebar-bottom .ws-name { font-size: 12px; color: #E2E8F0; font-weight: 600; }
  .sidebar-bottom .ws-plan { font-size: 10px; color: #64748B; }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Topbar ── */
  .topbar {
    height: var(--topbar-h);
    background: #fff;
    border-bottom: 1px solid #E2E8F0;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    flex-shrink: 0;
  }
  .topbar-search {
    flex: 1;
    max-width: 480px;
    position: relative;
  }
  .topbar-search input {
    width: 100%;
    height: 36px;
    border: 1px solid #E2E8F0;
    border-radius: 8px;
    padding: 0 12px 0 36px;
    font-size: 13px;
    background: #F8FAFC;
    color: var(--slate);
    outline: none;
    transition: border-color 0.2s;
  }
  .topbar-search input::placeholder { color: #94A3B8; }
  .topbar-search input:focus { border-color: var(--teal); background: #fff; }
  .topbar-search svg {
    position: absolute;
    left: 10px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: #94A3B8;
  }
  .topbar-search .shortcut {
    position: absolute;
    right: 10px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: #94A3B8;
    background: #F1F5F9; padding: 2px 6px; border-radius: 4px;
    border: 1px solid #E2E8F0;
  }

  .topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .topbar-btn {
    width: 36px; height: 36px;
    border: none; background: transparent;
    border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gray);
    transition: all 0.15s;
    position: relative;
  }
  .topbar-btn:hover { background: #F1F5F9; color: var(--slate); }
  .topbar-btn svg { width: 20px; height: 20px; }
  .topbar-btn .badge {
    position: absolute; top: 4px; right: 4px;
    width: 8px; height: 8px;
    background: #EF4444; border-radius: 50%;
    border: 2px solid #fff;
  }

  .topbar-profile {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 8px 4px 4px;
    border-radius: 8px; cursor: pointer;
    transition: background 0.15s;
  }
  .topbar-profile:hover { background: #F1F5F9; }
  .topbar-profile .avatar {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--teal), #06B6D4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
  }
  .topbar-profile .name { font-size: 13px; font-weight: 500; color: var(--slate); }

  /* ── Content ── */
  .content {
    flex: 1;
    overflow: auto;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .content-placeholder {
    text-align: center;
    color: #94A3B8;
  }
  .content-placeholder svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
  .content-placeholder p { font-size: 14px; }
</style>

</div>

<script>
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const chevron = item.querySelector('.chevron');
    const subMenu = item.parentElement.querySelector('.sub-menu');
    if (chevron && subMenu) {
      chevron.classList.toggle('open');
      subMenu.classList.toggle('open');
    }
    // Highlight active
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
  });
});

document.querySelectorAll('.sub-item').forEach(item => {
  item.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.sub-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
  });
});
</script>
</body>
</html>
